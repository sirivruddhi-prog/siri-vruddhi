name: Diagnose Actions trigger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show basic info
        run: |
          echo "Running diagnostic workflow"
          echo "Commit: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo "Repository: $GITHUB_REPOSITORY"
          uname -a || true
          echo "--- ls ---"
          ls -la || true
          echo "--- env keys (sorted) ---"
          env | sed -n '1,200p' | sort || true
