<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sri Chakra">
  <defs>
    <!-- Rich Golden Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227" />
      <stop offset="30%" stop-color="#e8c547" />
      <stop offset="50%" stop-color="#fff0a5" />
      <stop offset="70%" stop-color="#e8c547" />
      <stop offset="100%" stop-color="#9a7516" />
    </linearGradient>
    <!-- Soft Golden Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <!-- 1. Outer Bhupura (Square with 4 gates) -->
    <!-- Triple line square border with gates -->
    <!-- Outer Gate -->
    <path d="M 20,20 L 85,20 L 85,12 L 115,12 L 115,20 L 180,20 L 180,85 L 188,85 L 188,115 L 180,115 L 180,180 L 115,180 L 115,188 L 85,188 L 85,180 L 20,180 L 20,115 L 12,115 L 12,85 L 20,85 Z" stroke-width="1.5" />
    <!-- Middle Gate -->
    <path d="M 25,25 L 87,25 L 87,18 L 113,18 L 113,25 L 175,25 L 175,87 L 182,87 L 182,113 L 175,113 L 175,175 L 113,175 L 113,182 L 87,182 L 87,175 L 25,175 L 25,113 L 18,113 L 18,87 L 25,87 Z" stroke-width="1" opacity="0.8" />
    <!-- Inner Gate -->
    <path d="M 30,30 L 89,30 L 89,24 L 111,24 L 111,30 L 170,30 L 170,89 L 176,89 L 176,111 L 170,111 L 170,170 L 111,170 L 111,176 L 89,176 L 89,170 L 30,170 L 30,111 L 24,111 L 24,89 L 30,89 Z" stroke-width="0.8" opacity="0.6" />

    <!-- 2. Concentric Outer Circles -->
    <circle cx="100" cy="100" r="66" stroke-width="1.5" />
    <circle cx="100" cy="100" r="62" stroke-width="1" />

    <!-- 3. 16 Lotus Petals -->
    <g class="petals-16" stroke-width="1">
      <path d="
        M 100,48 C 96,38 104,38 100,48
        M 119.1,51.9 C 123.5,42.7 130.6,49.8 119.1,51.9
        M 133.9,62.8 C 142.1,57.1 145.2,66.8 133.9,62.8
        M 141.8,79.1 C 151.7,77.7 150.3,88.7 141.8,79.1
        M 141.8,97.5 C 152.1,100.2 147.2,110.2 141.8,97.5
        M 133.9,114.9 C 142.7,120.3 135.6,128.4 133.9,114.9
        M 119.1,128.1 C 124.8,136.3 115.1,139.4 119.1,128.1
        M 100,132 C 101.4,142.2 90.4,140.8 100,132
        M 80.9,128.1 C 76.5,137.3 69.4,130.2 80.9,128.1
        M 66.1,114.9 C 57.9,120.6 54.8,110.9 66.1,114.9
        M 58.2,97.5 C 48.3,98.9 49.7,87.9 58.2,97.5
        M 58.2,79.1 C 47.9,76.4 52.8,66.4 58.2,79.1
        M 66.1,62.8 C 57.3,57.4 64.4,49.3 66.1,62.8
        M 80.9,51.9 C 75.2,43.7 84.9,40.6 80.9,51.9
        M 100,48 Z" />
    </g>
    
    <!-- Circles between 16 and 8 petals -->
    <circle cx="100" cy="100" r="52" stroke-width="1" />
    
    <!-- 4. 8 Lotus Petals -->
    <g class="petals-8" stroke-width="1.2">
      <path d="
        M 100,60 C 93,48 107,48 100,60
        M 128.3,71.7 C 136.8,63.2 136.8,77.3 128.3,71.7
        M 140,100 C 152,93 152,107 140,100
        M 128.3,128.3 C 136.8,136.8 122.7,136.8 128.3,128.3
        M 100,140 C 107,152 93,152 100,140
        M 71.7,128.3 C 63.2,136.8 63.2,122.7 71.7,128.3
        M 60,100 C 48,107 48,93 60,100
        M 71.7,71.7 C 63.2,63.2 77.3,63.2 71.7,71.7 Z" />
    </g>

    <!-- Circles between 8 petals and triangles -->
    <circle cx="100" cy="100" r="40" stroke-width="1" />
    <circle cx="100" cy="100" r="37" stroke-width="0.8" opacity="0.8" />

    <!-- 5. Sri Yantra Core Interlocking Triangles -->
    <g class="triangles" stroke-width="0.9">
      <!-- Downward 1 (Largest) -->
      <polygon points="100,135 66,72 134,72" />
      <!-- Upward 1 (Largest) -->
      <polygon points="100,65 66,128 134,128" />
      
      <!-- Downward 2 -->
      <polygon points="100,128 72,82 128,82" />
      <!-- Upward 2 -->
      <polygon points="100,72 72,118 128,118" />

      <!-- Downward 3 -->
      <polygon points="100,120 78,90 122,90" />
      <!-- Upward 3 -->
      <polygon points="100,80 78,110 122,110" />

      <!-- Downward 4 -->
      <polygon points="100,112 84,95 116,95" />
      <!-- Upward 4 -->
      <polygon points="100,88 84,105 116,105" />

      <!-- Inner Downward 5 -->
      <polygon points="100,107 90,99 110,99" />
    </g>

    <!-- 6. Central Bindu -->
    <circle cx="100" cy="100" r="2.5" fill="url(#goldGrad)" stroke="none" />
  </g>
</svg>
