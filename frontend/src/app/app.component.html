<div
  class="scroll-progress"
  *ngIf="showSiteChrome"
  role="presentation"
  [style.--progress]="scrollProgress"
></div>

<header class="site-header" *ngIf="showSiteChrome" [class.scrolled]="headerScrolled">
  <nav class="nav-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <img src="assets/images/sri-chakra.svg" alt="" class="logo-chakra" width="36" height="36" />
      <span class="logo-text brand-title">Siri Vruddhi</span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      [attr.aria-expanded]="menuOpen"
      aria-label="Toggle menu"
      (click)="toggleMenu()"
    >
      <span></span><span></span><span></span>
    </button>

    <div class="nav-links" [class.open]="menuOpen">
      <a routerLink="/" fragment="about" [class.nav-active]="isNavActive({ id: 'about', label: 'About' })" (click)="closeMenu()">About</a>
      <a routerLink="/" fragment="spaces" [class.nav-active]="isNavActive({ id: 'spaces', label: 'Spaces' })" (click)="closeMenu()">Spaces</a>
      <a routerLink="/" fragment="facilities" [class.nav-active]="isNavActive({ id: 'facilities', label: 'Facilities' })" (click)="closeMenu()">Facilities</a>
      <a routerLink="/" fragment="reviews" [class.nav-active]="isNavActive({ id: 'reviews', label: 'Reviews' })" (click)="closeMenu()">Reviews</a>
      <a routerLink="/" fragment="dining" [class.nav-active]="isNavActive({ id: 'dining', label: 'Dining' })" (click)="closeMenu()">Dining</a>
      <a routerLink="/" fragment="teaser" [class.nav-active]="isNavActive({ id: 'teaser', label: 'Video' })" (click)="closeMenu()">Video</a>
      <a routerLink="/gallery" routerLinkActive="nav-active" [class.nav-active]="isNavActive({ id: 'gallery', label: 'Gallery' })" (click)="closeMenu()">Gallery</a>
      <a [href]="'tel:' + contact.phoneTel" class="nav-phone" (click)="closeMenu()">{{ contact.phoneDisplay }}</a>
      <a routerLink="/" fragment="contact" class="nav-cta" (click)="closeMenu()">Book a Tour</a>
    </div>
  </nav>
</header>

<nav
  class="journey-rail"
  *ngIf="showSiteChrome && isHomePage"
  aria-label="Page sections"
>
  <button
    type="button"
    *ngFor="let step of journeySections"
    class="journey-rail__dot"
    [class.active]="activeSection === step.id"
    [attr.aria-label]="step.label"
    [attr.aria-current]="activeSection === step.id ? 'step' : null"
    (click)="navLink(step)"
  >
    <span class="journey-rail__label">{{ step.label }}</span>
  </button>
</nav>

<div class="route-shell" [@routeFade]="getRouteState(outlet)" *ngIf="showSiteChrome">
  <router-outlet #outlet="outlet"></router-outlet>
</div>
<router-outlet *ngIf="!showSiteChrome"></router-outlet>

<div class="sticky-cta" [class.visible]="showStickyCta && showSiteChrome" *ngIf="showSiteChrome">
  <a routerLink="/" fragment="contact" class="btn btn-primary btn-block">Book a Tour</a>
  <a [href]="'tel:' + contact.phoneTel" class="btn btn-outline btn-block sticky-cta__call">Call</a>
</div>

<button
  type="button"
  class="back-to-top"
  [class.visible]="showBackToTop && showSiteChrome"
  aria-label="Back to top"
  (click)="scrollToTop()"
>
  ↑
</button>

<a
  *ngIf="showSiteChrome"
  class="whatsapp-float"
  [class.whatsapp-float--pulse]="whatsappPulsing"
  [href]="contact.whatsappUrl"
  target="_blank"
  rel="noopener noreferrer"
  aria-label="Chat on WhatsApp"
  title="WhatsApp us"
  (click)="onWhatsAppClick()"
>
  <svg viewBox="0 0 24 24" aria-hidden="true" width="28" height="28" fill="currentColor">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
  </svg>
</a>

<footer class="site-footer" *ngIf="showSiteChrome">
  <div class="footer-bar">
    <a routerLink="/" class="footer-logo">
      <img src="assets/images/sri-chakra.svg" alt="" class="logo-chakra" width="28" height="28" />
      <span class="logo-text brand-title">Siri Vruddhi</span>
    </a>

    <nav class="footer-nav" aria-label="Footer">
      <a routerLink="/" fragment="about">About</a>
      <a routerLink="/" fragment="spaces">Spaces</a>
      <a routerLink="/" fragment="facilities">Facilities</a>
      <a routerLink="/" fragment="reviews">Reviews</a>
      <a routerLink="/" fragment="dining">Dining</a>
      <a routerLink="/gallery">Gallery</a>
      <a routerLink="/" fragment="contact">Inquire</a>
    </nav>

    <div class="footer-icon-links">
      <a [href]="'tel:' + contact.phoneTel" class="footer-icon-link" [attr.aria-label]="'Call ' + contact.phoneDisplay" title="Call">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </a>
      <a [href]="'mailto:' + contact.email" class="footer-icon-link" aria-label="Email us" title="Email">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <path d="M22 6l-10 7L2 6"/>
        </svg>
      </a>
      <a [href]="contact.mapsUrl" class="footer-icon-link" target="_blank" rel="noopener noreferrer" aria-label="Get directions" title="Directions">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </a>
      <a [href]="contact.instagramUrl" class="footer-icon-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </div>
  <p class="footer-copy">© 2026 Siri Vruddhi · {{ contact.location }}</p>
</footer>
