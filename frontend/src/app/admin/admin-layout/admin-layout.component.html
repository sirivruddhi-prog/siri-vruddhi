<div class="admin-app-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <img src="assets/images/sri-chakra.svg" alt="" width="28" height="28" />
      <div>
        <p class="admin-sidebar__title">Siri Vruddhi</p>
        <p class="admin-sidebar__subtitle">Admin</p>
      </div>
    </div>

    <nav class="admin-sidebar__nav">
      <a routerLink="dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="inquiries" routerLinkActive="active">Inquiries</a>
      <p class="admin-sidebar__group">Website CMS</p>
      <a routerLink="website/contact" routerLinkActive="active">Contact &amp; links</a>
      <a routerLink="website/home" routerLinkActive="active">Home page</a>
      <a routerLink="website/gallery" routerLinkActive="active">Gallery</a>
    </nav>

    <div class="admin-sidebar__footer">
      <p class="admin-sidebar__email">{{ email }}</p>
      <button type="button" class="admin-sidebar__logout" (click)="logout()" [disabled]="loggingOut">
        {{ loggingOut ? 'Signing out…' : 'Logout' }}
      </button>
    </div>
  </aside>

  <div class="admin-content-area">
    <main class="admin-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
