<app-admin-loading-bar></app-admin-loading-bar>

<div class="admin-login">
  <div class="admin-login__visual">
    <div class="admin-login__visual-inner">
      <img src="assets/images/sri-chakra.svg" alt="" width="56" height="56" />
      <p class="admin-login__brand">Siri Vruddhi</p>
      <h2>Venue operations portal</h2>
      <p>Manage inquiries, update your website, and control gallery photos from one secure dashboard.</p>
    </div>
  </div>

  <div class="admin-login__panel">
    <div class="admin-login__card" [class.admin-login__card--loading]="loading">
      <div class="admin-login__card-overlay" *ngIf="loading">
        <app-admin-loader message="Signing in…" size="lg"></app-admin-loader>
      </div>

      <p class="admin-login__eyebrow">Admin access</p>
      <h1>Sign in</h1>
      <p class="admin-login__hint">For venue staff only — no public registration.</p>

      <form (ngSubmit)="submit()">
        <label for="admin-password">Password</label>
        <input
          id="admin-password"
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          placeholder="Enter your admin password"
          required
        />

        <p class="admin-login__error" *ngIf="error">{{ error }}</p>

        <button type="submit" [disabled]="loading || !password">
          <span class="adm-btn-spinner" *ngIf="loading" aria-hidden="true"></span>
          {{ loading ? 'Signing in…' : 'Enter dashboard →' }}
        </button>
      </form>
    </div>
  </div>
</div>
