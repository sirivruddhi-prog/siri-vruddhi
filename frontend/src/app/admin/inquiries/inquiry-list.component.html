<section class="inquiry-list">
  <div class="dashboard-cards">
    <article class="dashboard-card dashboard-card--accent">
      <span class="dashboard-card__label">New</span>
      <strong class="dashboard-card__value">{{ counts.new }}</strong>
    </article>
    <article class="dashboard-card">
      <span class="dashboard-card__label">Today</span>
      <strong class="dashboard-card__value">{{ counts.today }}</strong>
    </article>
    <article class="dashboard-card">
      <span class="dashboard-card__label">This week</span>
      <strong class="dashboard-card__value">{{ counts.thisWeek }}</strong>
    </article>
    <article class="dashboard-card">
      <span class="dashboard-card__label">Possible duplicates</span>
      <strong class="dashboard-card__value">{{ duplicateCount }}</strong>
    </article>
  </div>

  <div class="event-breakdown" *ngIf="topEventTypes.length">
    <span class="event-breakdown__label">Top event types</span>
    <span class="event-chip" *ngFor="let item of topEventTypes">{{ item.name }} · {{ item.count }}</span>
  </div>

  <div class="inquiry-list__toolbar">
    <span class="stat-pill stat-pill--muted">{{ total }} matching</span>
    <button type="button" class="btn-secondary" (click)="exportCsv()" [disabled]="exporting">
      {{ exporting ? 'Exporting…' : 'Export CSV' }}
    </button>
  </div>

  <div class="inquiry-list__filters">
    <label>
      Status
      <select [(ngModel)]="statusFilter" (change)="applyFilters()">
        <option *ngFor="let item of statuses" [value]="item.value">{{ item.label }}</option>
      </select>
    </label>

    <label>
      Event type
      <select [(ngModel)]="eventTypeFilter" (change)="applyFilters()">
        <option value="">All events</option>
        <option *ngFor="let type of eventTypes" [value]="type">{{ type }}</option>
      </select>
    </label>

    <label>
      From
      <input type="date" [(ngModel)]="dateFrom" (change)="applyFilters()" />
    </label>

    <label>
      To
      <input type="date" [(ngModel)]="dateTo" (change)="applyFilters()" />
    </label>

    <label class="inquiry-list__search">
      Search
      <input
        type="search"
        [(ngModel)]="search"
        placeholder="Name, phone, email…"
        (keyup.enter)="applyFilters()"
      />
    </label>

    <button type="button" class="btn-primary" (click)="applyFilters()">Apply</button>
    <button type="button" class="btn-link" (click)="clearDateFilters()" *ngIf="dateFrom || dateTo">Clear dates</button>
  </div>

  <p class="inquiry-list__error" *ngIf="error">{{ error }}</p>
  <p class="inquiry-list__loading" *ngIf="loading">Loading inquiries…</p>

  <div class="inquiry-table" *ngIf="!loading">
    <div class="inquiry-table__head">
      <span>Status</span>
      <span>Name</span>
      <span>Event</span>
      <span>Phone</span>
      <span>Submitted</span>
    </div>

    <button
      type="button"
      class="inquiry-row"
      *ngFor="let inquiry of inquiries"
      (click)="openInquiry(inquiry.id)"
    >
      <span class="inquiry-row__status">
        <span class="status-badge" [attr.data-status]="inquiry.status">{{ statusLabel(inquiry.status) }}</span>
        <span class="duplicate-badge" *ngIf="inquiry.isDuplicate">Dup</span>
      </span>
      <span>{{ inquiry.name }}</span>
      <span>{{ inquiry.eventType }}</span>
      <span>{{ inquiry.phone }}</span>
      <span>{{ formatDate(inquiry.createdAt) }}</span>
    </button>

    <p class="inquiry-list__empty" *ngIf="!inquiries.length">No inquiries match your filters.</p>
  </div>
</section>
