# Render Blueprint — deploy from Dashboard: New > Blueprint > connect this repo
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: siri-vruddhi-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: mysql
      - key: CORS_ORIGINS
        value: https://sirivruddhi.com,https://www.sirivruddhi.com
      - key: DB_PORT
        value: "3306"
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
