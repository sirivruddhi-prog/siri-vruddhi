# Render Blueprint — deploy from Dashboard: New > Blueprint > connect this repo
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: siri-vruddhi-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: mysql
      - key: CORS_ORIGINS
        value: https://sirivruddhi.com,https://www.sirivruddhi.com
      - key: DB_PORT
        value: "3306"
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: NOTIFY_EMAIL
        value: sirivruddhi@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "Siri Vruddhi Website" <sirivruddhi@gmail.com>
